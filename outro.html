<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Outro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Aumentar la transparencia y reducir el difuminado para que los videos de fondo sean más visibles */
    .hud-panel {
      backdrop-filter: blur(3px) !important;
      -webkit-backdrop-filter: blur(3px) !important;
    }
    
    .hud-panel:first-child {
      background: rgba(var(--cyber-red-rgb), 0.30) !important; /* Más transparente (antes 0.55) */
    }
    
    .hud-panel:last-child {
      background: rgba(10, 10, 18, 0.45) !important; /* Más transparente (antes 0.70) */
    }
  </style>
</head>
<body>

  <!-- Background Layer (Optional extra glow) -->
  <div class="bg-layer">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
  </div>

  <!-- Video Background System -->
  <div class="video-background-container">
    <video id="bgVideo1" class="bg-video active" autoplay muted playsinline loop></video>
    <video id="bgVideo2" class="bg-video" autoplay muted playsinline loop></video>
  </div>

  <!-- Main HUD Layout -->
  <div class="game-hud">
    <div class="hud-body">
      
      <!-- LEFT: Menu panel -->
      <section class="hud-panel">
        <div class="panel-list" id="menuList">
          <!-- JS populate: Menu navigation (Horario, Top Canal, etc.) -->
        </div>
      </section>

      <!-- RIGHT: Dynamic Content panel -->
      <section class="hud-panel">
        <div class="panel-list" id="contentArea">
          <!-- JS populate based on active menu item -->
        </div>
      </section>

    </div>
  </div>


  <!-- Firebase SDK and custom Outro Script -->
  <script type="module" src="outro-script.js?v=1.1"></script>
</body>
</html>
